<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhook Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus, textarea:focus { border-color: #4f46e5; }
    textarea { resize: vertical; min-height: 90px; font-family: inherit; }
    button {
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .result.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .result.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .note {
      font-size: 12px;
      color: #999;
      margin-top: -12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Webhook Tester</h1>

    <label>Endpoint</label>
    <input type="url" id="endpoint" value="https://webhook-whatsapp.strategicai.com.br/mya-disparo" placeholder="https://...">

    <label>Número do lead</label>
    <input type="text" id="phone" placeholder="5521983880100" maxlength="20">
    <p class="note">Somente números, com DDI (ex: 5521999999999)</p>

    <label>Mensagem</label>
    <textarea id="message" placeholder="Boa Tarde! Como assim?"></textarea>

    <button id="btn" onclick="enviar()">Enviar</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    async function enviar() {
      const endpoint = document.getElementById('endpoint').value.trim();
      const phone    = document.getElementById('phone').value.trim().replace(/\D/g, '');
      const message  = document.getElementById('message').value.trim();
      const result   = document.getElementById('result');
      const btn      = document.getElementById('btn');

      result.style.display = 'none';

      if (!endpoint || !phone || !message) {
        result.className = 'result error';
        result.textContent = 'Preencha todos os campos.';
        result.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const payload = {
        EventType: "messages",
        message: {
          fromMe: false,
          chatid: `${phone}@s.whatsapp.net`,
          sender_pn: `${phone}@s.whatsapp.net`,
          senderName: "Lead",
          text: message
        }
      };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        result.className = 'result success';
        result.textContent = `✓ ${data.message || 'Enviado com sucesso'}`;
      } catch (err) {
        result.className = 'result error';
        result.textContent = `Erro: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar';
        result.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') enviar();
    });
  </script>
</body>
</html>
